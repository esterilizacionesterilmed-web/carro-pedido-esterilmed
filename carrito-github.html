<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EsterilMed · Carro de Pedido</title>
<style>
  :root{
    --navy:#12305A;
    --navy-2:#1F3864;
    --green:#2E7D4F;
    --green-l:#E6F4EC;
    --bg:#F3F5F8;
    --card:#FFFFFF;
    --line:#E1E6EC;
    --ink:#1C2733;
    --ink-soft:#5B6B7C;
    --amber:#B7791F;
    --amber-l:#FCF1DC;
    --red:#B3261E;
    --red-l:#FBE9E7;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:Arial, "Helvetica Neue", Helvetica, sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:32px;
  }
  .topbar{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff;
    padding:16px 16px 16px;
    border-bottom-left-radius:20px;
    border-bottom-right-radius:20px;
  }
  .topbar .logorow{display:flex;align-items:center;gap:10px;}
  .topbar img.logo{height:34px;width:auto;background:#fff;border-radius:6px;padding:3px 6px;}
  .topbar .title-txt h1{margin:0;font-size:18px;font-weight:800;line-height:1.2;}
  .topbar .title-txt .sub{font-size:10.5px;opacity:.75;font-weight:600;letter-spacing:.03em;}
  .rolebar{display:flex;gap:8px;margin-top:14px;}
  .rolebtn{
    flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.08);color:#fff;font-weight:700;font-size:13px;text-align:center;cursor:pointer;
  }
  .rolebtn.active{background:#fff;color:var(--navy);border-color:#fff;}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px;}
  .card{
    background:var(--card);border-radius:var(--radius);padding:16px;margin-top:14px;
    box-shadow:0 1px 3px rgba(20,30,50,.06);border:1px solid var(--line);
  }
  .card h2{margin:0 0 4px;font-size:15px;color:var(--navy);}
  .muted{color:var(--ink-soft);font-size:12.5px;line-height:1.5;}
  select, input[type=text], input[type=number]{
    font-family:inherit;font-size:15px;padding:10px 12px;border-radius:10px;
    border:1.5px solid var(--line);background:#fff;width:100%;color:var(--ink);
  }
  select:focus, input:focus{outline:2px solid var(--green);outline-offset:1px;}
  label.field{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.03em;}
  .weeknav{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .weeknav button{
    border:1.5px solid var(--line);background:#fff;border-radius:10px;width:38px;height:38px;
    font-size:16px;font-weight:800;color:var(--navy);cursor:pointer;
  }
  .weekpill{flex:1;text-align:center;background:var(--green-l);color:var(--green);border-radius:10px;padding:9px 6px;font-weight:800;font-size:13.5px;}
  .search{margin-top:12px;}
  .itemlist{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:56vh;overflow-y:auto;padding-right:2px;}
  .item{display:flex;align-items:center;justify-content:space-between;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;}
  .item.active{border-color:var(--green);background:var(--green-l);}
  .item .name{font-size:13.5px;font-weight:700;line-height:1.3;}
  .item .unit{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .stepper{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;}
  .stepper button{width:32px;height:32px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:17px;font-weight:800;cursor:pointer;line-height:1;}
  .stepper button.minus{background:#E3E7EC;color:var(--navy);}
  .stepper .qty{width:30px;text-align:center;font-weight:800;font-size:15px;}
  .cartbar{
    position:sticky;bottom:10px;margin-top:14px;background:var(--navy);color:#fff;border-radius:14px;
    padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 6px 18px rgba(18,48,90,.35);
  }
  .cartbar .info{font-size:13px;font-weight:700;}
  .cartbar .info span{opacity:.7;font-weight:400;display:block;font-size:11px;}
  .btn{border:none;border-radius:10px;padding:11px 16px;font-weight:800;font-size:14px;cursor:pointer;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:disabled{background:#9FB6A9;cursor:not-allowed;}
  .btn-outline{background:#fff;border:1.5px solid var(--line);color:var(--navy);}
  .btn-block{width:100%;margin-top:12px;}
  .tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;}
  .tag-pend{background:var(--amber-l);color:var(--amber);}
  .tag-ok{background:var(--green-l);color:var(--green);}
  .tag-off{background:#EEF0F3;color:var(--ink-soft);}
  .tag-warn{background:var(--red-l);color:var(--red);}
  table.consol{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
  table.consol th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);border-bottom:1.5px solid var(--line);padding:6px 4px;}
  table.consol td{padding:8px 4px;border-bottom:1px solid #EEF1F4;vertical-align:top;}
  table.consol td.qty, table.consol th.qty{text-align:center;}
  .whochip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#EEF1F4;color:var(--ink-soft);display:inline-block;margin-top:2px;margin-right:3px;}
  .empty{text-align:center;padding:26px 10px;color:var(--ink-soft);font-size:13px;}
  .toast{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.25);
    z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center;
  }
  .toast.show{opacity:1;}
  .subtabs{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .subtab{flex:1;min-width:70px;text-align:center;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:800;background:#EEF1F4;color:var(--ink-soft);cursor:pointer;}
  .subtab.active{background:var(--navy);color:#fff;}
  textarea{
    width:100%;min-height:150px;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;
    border:1.5px solid var(--line);border-radius:10px;padding:10px;background:#FAFBFC;color:var(--ink);
  }
  .diffneg{color:var(--red);font-weight:800;}
  .diffok{color:var(--green);font-weight:800;}
  .histrow{display:flex;align-items:center;justify-content:space-between;padding:10px 2px;border-bottom:1px solid #EEF1F4;}
  .histrow:last-child{border-bottom:none;}
  .histrow .d{font-size:13px;font-weight:700;}
  .histrow .s{font-size:11px;color:var(--ink-soft);}
  .spinner{
    display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .barrow{display:flex;align-items:center;gap:8px;margin:7px 0;}
  .barrow .lbl{width:44%;font-size:12px;font-weight:600;flex-shrink:0;}
  .barrow .track{flex:1;background:#EEF1F4;border-radius:6px;height:16px;overflow:hidden;}
  .barrow .fill{background:var(--green);height:100%;border-radius:6px;}
  .barrow .val{width:36px;text-align:right;font-size:12px;font-weight:800;flex-shrink:0;}
  .risebadge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;}
  .rise-up{background:var(--red-l);color:var(--red);}
  .rise-down{background:var(--green-l);color:var(--green);}
  .rise-flat{background:#EEF1F4;color:var(--ink-soft);}
  .footer-credit{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:22px;padding-bottom:8px;}
</style>
</head>

// ---------- utilidades de semana (miércoles) ----------
function getWeekId(d){
  const date = new Date(d);
  const day = date.getDay();
  let diff = 3 - day;
  date.setDate(date.getDate() + diff);
  return fmtISO(date);
}
function fmtISO(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), da=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function fmtDisplay(iso){
  const [y,m,d]=iso.split('-');
  return `Miércoles ${d}/${m}/${y}`;
}
function fmtMes(mk){
  if(!mk) return '';
  const [y,m] = mk.split('-');
  const nombres = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${nombres[parseInt(m,10)-1]} ${y}`;
}
function shiftWeek(iso, delta){
  const d = new Date(iso+'T12:00:00');
  d.setDate(d.getDate()+delta*7);
  return fmtISO(d);
}

// ---------- puente hacia la API de Google Apps Script ----------
// PEGA AQUÍ la URL que te entrega Apps Script en "Implementar > Aplicación web"
// Debe terminar en /exec . Ejemplo: https://script.google.com/macros/s/AKfycb.../exec
const API_URL = "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT";

async function apiGet(action, params){
  params = params || {};
  const qs = new URLSearchParams(Object.assign({action:action}, params)).toString();
  const res = await fetch(API_URL + "?" + qs);
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}
async function apiPost(action, payload){
  payload = payload || {};
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // evita el preflight CORS
    body: JSON.stringify(Object.assign({action:action}, payload))
  });
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}

// gsRun mantiene la misma forma de llamada que antes (fnName, ...args) para no
// tener que reescribir toda la app; solo enruta hacia GET o POST según corresponda.
function gsRun(fnName, ...args){
  switch(fnName){
    case 'getCarritoPersona': return apiGet('getCarritoPersona', {week:args[0], solicitante:args[1]});
    case 'getConsolidado':    return apiGet('getConsolidado', {week:args[0]});
    case 'getEnvio':          return apiGet('getEnvio', {week:args[0]});
    case 'getRecepcion':      return apiGet('getRecepcion', {week:args[0]});
    case 'getHistorial':      return apiGet('getHistorial');
    case 'getEstadisticas':   return apiGet('getEstadisticas');
    case 'submitCarrito':     return apiPost('submitCarrito', {week:args[0], solicitante:args[1], items:args[2]});
    case 'marcarEnviado':     return apiPost('marcarEnviado', {week:args[0]});
    case 'guardarRecepcion':  return apiPost('guardarRecepcion', {week:args[0], items:args[1]});
    default: return Promise.reject(new Error('Función no reconocida: ' + fnName));
  }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

function errText(e){
  if(!e) return 'error desconocido';
  if(typeof e === 'string') return e;
  return e.message || JSON.stringify(e);
}

function unitFor(name){
  const found = CATALOG.find(it=>it.n===name);
  return found ? found.u : '';
}

function setRole(r){

  document.getElementById('btnSec').classList.toggle('active', r==='sec');
  render();
}

function renderSupervisora(){
  const app = document.getElementById('app');

  const items = CATALOG.filter(it => it.n.toLowerCase().includes(state.search.toLowerCase()));
  let itemsHtml;
  if(items.length===0){
    itemsHtml = `<div class="empty">No se encontraron insumos con ese nombre.</div>`;
  } else {
    itemsHtml = items.map(it=>{
      const qty = (state.cart[it.n]||0);
      return `<div class="item ${qty>0?'active':''}">
        <div><div class="name">${it.n}</div><div class="unit">${it.u||''}</div></div>
        <div class="stepper">
          <button class="minus" onclick="changeQty('${escJs(it.n)}',-1)">−</button>
          <div class="qty">${qty}</div>
          <button onclick="changeQty('${escJs(it.n)}',1)">+</button>
        </div>
      </div>`;
    }).join('');
  }

  const totalItems = Object.values(state.cart).filter(v=>v>0).length;
  const totalUnid = Object.values(state.cart).reduce((a,b)=>a+b,0);

  app.innerHTML = `
    <div class="card">
      <h2>Tu nombre y la semana del pedido</h2>
      <p class="muted">El pedido se arma para el retiro de bodega del día miércoles. Escribe tu nombre para poder editarlo después si algo cambia.</p>
      <label class="field">Tu nombre</label>
      <input type="text" placeholder="Ej: Leontina Ríos" value="${state.supName}" oninput="onNameInput(this.value)">
      <div class="weeknav">
        <button onclick="navWeek(-1)">‹</button>
        <div class="weekpill">${fmtDisplay(state.week)}</div>
        <button onclick="navWeek(1)">›</button>
      </div>
    </div>

    <div class="card">
      <h2>Agrega lo que necesitas</h2>
      <input class="search" type="text" placeholder="Buscar insumo..." value="${state.search}" oninput="state.search=this.value; renderSupervisora()">
      <div class="itemlist">${state.loading ? '<div class="empty">Cargando…</div>' : itemsHtml}</div>
    </div>
    <div class="cartbar">
      <div class="info">${totalItems} insumo(s) · ${totalUnid} unid.<span>${fmtDisplay(state.week)}${state.supName? ' · '+state.supName:''}</span></div>
      <button class="btn btn-primary" ${totalItems===0?'disabled':''} onclick="submitCart()" id="btnEnviar">Enviar pedido</button>
    </div>
  `;
}

function escJs(s){ return s.replace(/'/g,"\\'"); }

let nameDebounce = null;
function onNameInput(val){
  state.supName = val;
  clearTimeout(nameDebounce);
  nameDebounce = setTimeout(()=> loadMyCart(), 500);
}

async function loadMyCart(){
  if(!state.supName || state.supName.trim().length < 2) return;
  state.loading = true; renderSupervisora();
  try{
    const existing = await gsRun('getCarritoPersona', state.week, state.supName);
    state.cart = {};
    if(existing && existing.items){
      existing.items.forEach(i=> state.cart[i.n] = Number(i.q));
    }
  } catch(e){
    toast('No se pudo cargar tu pedido anterior: ' + errText(e));
  }
  state.loading = false;
  renderSupervisora();
}

function changeQty(name, delta){
  const cur = state.cart[name]||0;
  const next = Math.max(0, cur+delta);
  if(next===0) delete state.cart[name]; else state.cart[name]=next;
  renderSupervisora();
}

async function navWeek(delta){
  state.week = shiftWeek(state.week, delta);
  await loadMyCart();
}

async function submitCart(){
  const items = Object.entries(state.cart).map(([n,q])=>({n, q, u: unitFor(n)}));
  if(items.length===0) return;
  const btn = document.getElementById('btnEnviar');
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Enviando…'; }
  try{
    await gsRun('submitCarrito', state.week, state.supName||'(sin nombre)', items);
    toast('Pedido enviado ✓ La secretaria ya lo puede ver');
  } catch(e){
    toast('No se pudo guardar: ' + errText(e));
  }
  renderSupervisora();
}

    let stats = null;
    try{ stats = await gsRun('getEstadisticas'); } catch(e){
      body = `<div class="card"><div class="empty">No se pudo cargar: ${errText(e)}</div></div>`;
    }
    if(stats){
      const maxTop = stats.topInsumos.length ? Math.max(...stats.topInsumos.map(x=>x.q)) : 1;
      const topHtml = stats.topInsumos.map(x=>`
        <div class="barrow">
          <div class="lbl">${x.n}</div>
          <div class="track"><div class="fill" style="width:${Math.round((x.q/maxTop)*100)}%"></div></div>
          <div class="val">${x.q}</div>
        </div>`).join('');

      let compHtml = '';
      if(stats.mesAnterior){
        const subidas = stats.comparacionMensual.filter(c => c.variacionPct !== null && c.variacionPct >= 30);
        compHtml = `
        <p class="muted">Comparando <b>${fmtMes(stats.mesActual)}</b> vs <b>${fmtMes(stats.mesAnterior)}</b>. Se muestran los insumos que más subieron — útil para revisar consumo y bajar costos.</p>
        <table class="consol">
          <tr><th>Insumo</th><th class="qty">${fmtMes(stats.mesAnterior)}</th><th class="qty">${fmtMes(stats.mesActual)}</th><th class="qty">Variación</th></tr>
          ${stats.comparacionMensual.slice(0,15).map(c=>{
            let badge = '<span class="risebadge rise-flat">—</span>';
            if(c.variacionPct !== null){
              if(c.variacionPct >= 20) badge = `<span class="risebadge rise-up">▲ ${c.variacionPct}%</span>`;
              else if(c.variacionPct <= -20) badge = `<span class="risebadge rise-down">▼ ${c.variacionPct}%</span>`;
              else badge = `<span class="risebadge rise-flat">${c.variacionPct}%</span>`;
            } else if(c.actual > 0){
              badge = `<span class="risebadge rise-up">Nuevo</span>`;
            }
            return `<tr><td>${c.n}</td><td class="qty">${c.anterior}</td><td class="qty">${c.actual}</td><td class="qty">${badge}</td></tr>`;
          }).join('')}
        </table>
        ${subidas.length ? `<p class="muted" style="margin-top:8px;">⚠️ ${subidas.length} insumo(s) subieron 30% o más respecto al mes anterior — vale la pena revisar por qué.</p>` : ''}
        `;
      } else {
        compHtml = `<div class="empty">Se necesitan al menos 2 meses con pedidos registrados para comparar.</div>`;
      }

      body = `
      <div class="card">
        <h2>Insumos más solicitados (histórico)</h2>
        ${stats.topInsumos.length ? topHtml : '<div class="empty">Aún no hay pedidos registrados.</div>'}
      </div>
      <div class="card">
        <h2>Comparación mes a mes</h2>
        ${compHtml}
      </div>`;
    }
  }

  app.innerHTML = `
    <div class="card">
      <h2>Semana de pedido</h2>
      <div class="weeknav">
        <button onclick="navSecWeek(-1)">‹</button>
        <div class="weekpill">${fmtDisplay(state.secWeek)}</div>
        <button onclick="navSecWeek(1)">›</button>
      </div>
      ${tabsHtml}
    </div>
    ${body}
  `;
}

function recibidoDiff(pedido, recibido){
  if(recibido===null || recibido===undefined || recibido==='') return '<span class="muted">—</span>';
  const diff = Number(recibido) - Number(pedido);
  if(diff>=0) return `<span class="diffok">OK</span>`;
  return `<span class="diffneg">Faltan ${Math.abs(diff)}</span>`;
}

function setRecibido(idx, val){
  window.__recItemsCache[idx].recibido = val==='' ? null : Number(val);
}

async function guardarRecepcion(){
  const btn = document.getElementById('btnGuardarRecep');
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Guardando…'; }
  try{
    const items = window.__recItemsCache.map(it=>({n:it.n, pedido: it.pedido, recibido: it.recibido}));
    await gsRun('guardarRecepcion', state.secWeek, items);
    toast('Recepción guardada ✓');
  } catch(e){
    toast('No se pudo guardar: ' + errText(e));
  }
  renderSecretaria();
}

async function marcarEnviado(){
  try{
    await gsRun('marcarEnviado', state.secWeek);
    toast('Marcado como enviado a bodega ✓');
  } catch(e){
    toast('No se pudo marcar: ' + errText(e));
  }
  renderSecretaria();
}

async function showResumenTexto(){
  let consol;
  try{ consol = await gsRun('getConsolidado', state.secWeek); } catch(e){ toast('Error: '+errText(e)); return; }
  const consolidado = consol.consolidado || {};
  const lines = [`Pedido EsterilMed - ${fmtDisplay(state.secWeek)}`, ''];
  Object.entries(consolidado).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([n,d])=>{
    lines.push(`- ${n}: ${d.q} (${d.unit||unitFor(n)})`);
  });
  const box = document.getElementById('resumenBox');
  box.innerHTML = `<label class="field">Texto para copiar al correo</label><textarea readonly>${lines.join('\\n')}</textarea>`;
}

function switchSecTab(t){ state.secTab = t; renderSecretaria(); }
function navSecWeek(delta){ state.secWeek = shiftWeek(state.secWeek, delta); renderSecretaria(); }

// ============================================================
function render(){
  if(role==='sup') renderSupervisora();
  else renderSecretaria();
}
render();
</script>
</body>
</html>
